[package]
name = "daw-candidate"
version = "0.1.0"
edition = "2021"
description = "A candidate DAW audio-engine architecture. The loop mutates the engine; the evaluator scores it."

# Every candidate exposes the SAME library name and the SAME `Engine` API so the
# evaluator's harness can link and drive any of them. Rewrite the internals
# freely — keep the crate name and the public contract.
[lib]
name = "daw_candidate"
path = "src/lib.rs"

# The evaluator OVERWRITES this binary with its canonical harness before scoring.
# Keep the entry here; do not edit src/bin/bench.rs — your copy is ignored.
[[bin]]
name = "bench"
path = "src/bin/bench.rs"

# Timing claims are only meaningful in release. Debug builds are 10-50x slower.
[profile.release]
opt-level = 3
