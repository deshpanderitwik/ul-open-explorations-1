name: ci

# The "green" gate. Runs on every push and PR. When this passes, a rung is
# mergeable — that's what "auto-merge on green" depends on. It is the single
# source of truth for whether the engine + mobile client are healthy:
#   * regression — golden correctness + perf across ALL rungs (evaluator/regression.py)
#   * mobile smoke — the TypeScript protocol client drives the real engine
# This gate deliberately does NOT deploy anything (see release-ios.yml).

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Regression gate (golden + perf across all rungs)
        run: python evaluator/regression.py

      - name: Mobile protocol client smoke test (drives the real engine)
        # regression.py already built engine/target/release/headless.
        run: node --experimental-strip-types tools/smoke.ts
        working-directory: mobile
