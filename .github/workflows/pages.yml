name: pages

# Publishes the dashboard (dashboard/public) to GitHub Pages on every push to
# main. Regenerates data.json from the repo's own records first, so the dashboard
# always reflects the latest archive, ladder, and commits — i.e. the results
# between builds. No manual setup: the `configure-pages` step below enables Pages
# itself on first run (enablement: true) using the workflow token, so you never
# have to visit repo Settings. The live URL appears on the deploy job. (Falls
# back to the manual Settings -> Pages -> Source: GitHub Actions toggle only if
# org/repo policy forbids the token from managing Pages.)

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deploy actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 30   # so build.py can list recent commits
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Generate dashboard data
        run: python dashboard/build.py
      - name: Enable + configure GitHub Pages (no manual setup needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
